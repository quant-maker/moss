    }
    .loading {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;
    }
    .loading-text {
      margin-top: 20px;

<body>
  <div class="loading" id="loading">
    <svg width="60" height="60" viewBox="0 0 60 60">
      <circle cx="30" cy="30" r="25" stroke="#2196F3" stroke-width="4" fill="none" stroke-dasharray="78.5" stroke-linecap="round">
        <animateTransform attributeName="transform" type="rotate" from="0 30 30" to="360 30 30" dur="1s" repeatCount="indefinite"/>
      </circle>
    </svg>
    <div class="loading-text">加载中...</div>
  </div>

name: moss
description: "Moss - 智能管家助手"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  
  # 状态管理
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  
  # 网络请求
  dio: ^5.4.3+1
  
  # 本地存储
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # 路由
  go_router: ^14.2.0
  
  # UI 组件
  cupertino_icons: ^1.0.8
  flutter_markdown: ^0.7.3
  
  # 工具库
  uuid: ^4.4.0
  intl: ^0.19.0
  
  # Android Intent
  android_intent_plus: ^5.0.2
  url_launcher: ^6.2.6
  
  # 本地通知
  flutter_local_notifications: ^17.2.4
  timezone: ^0.9.4
  flutter_timezone: ^1.0.8
  
  # 系统日历
  device_calendar: ^4.3.2
  
  # 后台任务
  workmanager: ^0.5.2
  
  # 权限管理
  permission_handler: ^11.3.1
  
  # WebSocket
  web_socket_channel: ^2.4.5
  
  # 连接状态检测
  connectivity_plus: ^6.0.3
  
  # 语音识别 (Speech-to-Text)
  speech_to_text: ^6.6.2
  
  # 语音合成 (Text-to-Speech)
  flutter_tts: ^4.0.2
  
  # 音频可视化
  audio_waveforms: ^1.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  hive_generator: ^2.0.1
  riverpod_generator: ^2.4.0
  
  # 测试工具
  mockito: ^5.4.4
  mocktail: ^1.0.3
  fake_async: ^1.3.1
  
  # 应用图标生成
  flutter_launcher_icons: ^0.13.1
  
  # 启动屏生成
  flutter_native_splash: ^2.4.0

# 应用图标配置
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 24
  adaptive_icon_background: "#1565C0"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"
  web:
    generate: true
    image_path: "assets/icon/app_icon.png"
    background_color: "#1565C0"
    theme_color: "#1565C0"

# 启动屏配置
flutter_native_splash:
  color: "#1565C0"
  image: "assets/icon/splash_logo.png"
  android_12:
    color: "#1565C0"
    icon_background_color: "#1565C0"
    image: "assets/icon/splash_logo.png"
  web: false

flutter:
  uses-material-design: true
  
  assets:
    - assets/icon/
